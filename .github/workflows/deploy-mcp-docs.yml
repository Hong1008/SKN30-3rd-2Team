name: Deploy MCP documentation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "site/**"
      - "src/server/**"
      - "src/app.py"
      - "justfile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install just
        run: sudo apt-get update && sudo apt-get install --yes just
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Build MCP documentation
        run: just build-mcp-docs
      - name: Verify generated MCP specification
        run: uv run pytest tests/server/test_mcp_spec.py
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
